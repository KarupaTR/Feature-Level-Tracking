name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Write ADO PATs into env
        run: |
          echo "NEXT_PUBLIC_ADO_PAT_TR_TAX=${{ secrets.ADO_PAT_TR_TAX }}" >> .env.production
          echo "NEXT_PUBLIC_ADO_PAT_TR_TAX_DEFAULT=${{ secrets.ADO_PAT_TR_TAX_DEFAULT }}" >> .env.production

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        run: npx vercel --yes --prod --token=${{ secrets.VERCEL_TOKEN }}
